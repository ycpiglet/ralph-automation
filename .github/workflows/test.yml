name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run package tests
        run: PYTHONPATH=src python -m pytest tests -q
      - name: Check package CLI
        run: PYTHONPATH=src python -m ralph_automation.cli --version
      - name: Check public sanitization
        run: PYTHONPATH=src python -m ralph_automation.cli sanitize --root . --check
      - name: Check publish readiness
        run: PYTHONPATH=src python -m ralph_automation.cli publish-check --root . --check
      - name: Check publish bundle plan
        run: PYTHONPATH=src python -m ralph_automation.cli publish-bundle --source . --dest .tmp/public-source --check
      - name: Build clean publish bundle
        run: PYTHONPATH=src python -m ralph_automation.cli publish-bundle --source . --dest .tmp/public-source --apply
      - name: Check local tag smoke plan
        run: PYTHONPATH=src python -m ralph_automation.cli publish-tag-smoke --source . --repo-dir .tmp/tag-repo --install-dir .tmp/tag-install --check
      - name: Check GitHub publish plan
        run: PYTHONPATH=src python -m ralph_automation.cli publish-github-plan --source .tmp/public-source --remote-url https://github.com/example/ralph-automation.git --install-dir .tmp/public-source/.tmp/github-install --check
      - name: Check release preflight
        run: PYTHONPATH=.tmp/public-source/src python -m ralph_automation.cli release-preflight --source .tmp/public-source --host-root .tmp/public-source/tests/fixtures/host --remote-url https://github.com/example/ralph-automation.git --check
